<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skycast — Weather</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='52' font-size='52'> ⛅ </text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-layer"></div>
    <div class="noise"></div>

    <main class="container">
        <header class="header">
            <span class="logo">☁ Skycast</span>
            <span class="tagline">Weather</span>
        </header>

        <div class="search-wrap">
            <div class="search">
                <input type="text" placeholder="Search city…" aria-label="city name" autocomplete="off">
                <button aria-label="Search">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </button>
            </div>
            <p class="error-msg" id="error">City not found. Check the spelling and try again.</p>
        </div>

        <div class="card" id="weatherCard">
            <div class="card-top">
                <div class="location-block">
                    <h1 class="city" id="city">—</h1>
                    <p class="date" id="date"></p>
                </div>
                <div class="icon-block">
                    <img src="images/clouds.png" class="weathericon" id="weatherIcon" alt="weather">
                </div>
            </div>

            <div class="temp-block">
                <span class="temp" id="temp">—</span>
                <span class="unit">°C</span>
            </div>
            <p class="feels" id="feels">Feels like —°C</p>
            <p class="condition" id="condition">—</p>

            <div class="divider"></div>

            <div class="stats">
                <div class="stat">
                    <div class="stat-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-val" id="wind">—</span>
                        <span class="stat-label">Wind</span>
                    </div>
                </div>
                <div class="stat-sep"></div>
                <div class="stat">
                    <div class="stat-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-val" id="humidity">—</span>
                        <span class="stat-label">Humidity</span>
                    </div>
                </div>
                <div class="stat-sep"></div>
                <div class="stat">
                    <div class="stat-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-val" id="visibility">—</span>
                        <span class="stat-label">Visibility</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

   
    <script src="script.js"></script>
</body>
</html>
